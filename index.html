<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solver Estatística Experimental - Fernando Paes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.menu-ativo { background-color: #dcfce7; color: #15803d; font-weight: bold; border-right: 4px solid #16a34a; }</style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md flex flex-col h-full z-10">
        <div class="p-6 bg-green-700 text-white">
            <h1 class="text-xl font-bold">Solver Estatística</h1>
            <p class="text-xs text-green-200 mt-1">Por: Fernando Paes Lorena</p>
        </div>
        <nav class="flex-1 px-2 py-4 space-y-2">
            <button onclick="mudarAba('aba-fatorial', this)" class="menu-btn menu-ativo w-full text-left px-4 py-3 rounded text-sm text-gray-600 hover:bg-green-50">📈 Fatorial (A x B)</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <section id="aba-fatorial" class="aba-conteudo block">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Fatorial (A x B) em DBC</h2>
            
            <div class="mb-6 flex space-x-4 border-b pb-2">
                <button onclick="alternarEntrada('csv')" id="btnAbaCsv" class="font-bold text-green-700 border-b-2 border-green-700 px-2 py-1">Upload de Arquivo (CSV)</button>
                <button onclick="alternarEntrada('manual')" id="btnAbaManual" class="font-semibold text-gray-500 px-2 py-1">Digitação Manual Interativa</button>
            </div>

            <div id="entradaCsv" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-8 max-w-2xl block">
                <label class="block text-sm font-medium text-gray-700 mb-2">Carregar arquivo (FatorA, FatorB, Bloco, Valor):</label>
                <div class="flex items-center space-x-4">
                    <input type="file" id="arquivoCsv" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:bg-green-50 file:text-green-700">
                    <button onclick="enviarParaAnalise(false)" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded transition btn-calcular">Calcular ANOVA</button>
                </div>
            </div>

            <div id="entradaManual" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-8 max-w-3xl hidden">
                <p class="text-sm text-gray-500 mb-4">Informe o tamanho do experimento para gerar a grade de digitação.</p>
                <div class="flex space-x-4 mb-4">
                    <div><label class="text-xs">Níveis Fator A:</label><input type="number" id="manA" class="border p-2 w-full rounded" min="2" value="2"></div>
                    <div><label class="text-xs">Níveis Fator B:</label><input type="number" id="manB" class="border p-2 w-full rounded" min="2" value="2"></div>
                    <div><label class="text-xs">Qtd. Blocos:</label><input type="number" id="manR" class="border p-2 w-full rounded" min="2" value="3"></div>
                    <div class="flex items-end"><button onclick="gerarGradeManual()" class="bg-blue-600 text-white px-4 py-2 rounded">Gerar Grade</button></div>
                </div>
                
                <div id="gradeManualContainer" class="overflow-x-auto"></div>
                
                <div class="mt-4 hidden" id="divBtnAnalisarManual">
                    <button onclick="enviarParaAnalise(true)" class="bg-green-600 text-white font-bold py-2 px-6 rounded transition w-full btn-calcular">Calcular ANOVA a partir da Grade</button>
                </div>
            </div>

            <p id="mensagem" class="mt-3 text-sm font-medium hidden"></p>

            <div id="areaResultados" class="hidden bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-800">Quadro da ANOVA</h3>
                    <div class="text-sm bg-gray-100 px-3 py-1 rounded"><strong>CV:</strong> <span id="txtCv"></span>%</div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-100 text-gray-700"><tr><th class="px-4 py-2">FV</th><th class="px-4 py-2">GL</th><th class="px-4 py-2">SQ</th><th class="px-4 py-2">QM</th><th class="px-4 py-2">F Calc</th><th class="px-4 py-2">Sig</th></tr></thead>
                        <tbody id="corpoTabelaAnova" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div id="areaPostHoc" class="hidden bg-white p-6 rounded-lg shadow-sm border border-gray-200 mt-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4">Análises Posteriores</h3>
                <div class="flex items-center space-x-4 mb-6">
                    <select id="seletorPostHoc" onchange="verificarModelo()" class="block w-64 border border-gray-300 rounded p-2.5">
                        <option value="tukey_a">Teste de Tukey (Fator A)</option>
                        <option value="tukey_b">Teste de Tukey (Fator B)</option>
                        <option value="regr_a">Regressão (Fator A)</option>
                        <option value="regr_b">Regressão (Fator B)</option>
                    </select>
                    
                    <select id="seletorModeloRegr" class="hidden border border-gray-300 rounded p-2.5">
                        <option value="linear">Modelo Linear</option>
                        <option value="quadratica" selected>Modelo Quadrático</option>
                        <option value="logaritmica">Modelo Logarítmico</option>
                        <option value="exponencial">Modelo Exponencial</option>
                    </select>

                    <button onclick="gerarPostHoc()" class="bg-blue-600 text-white font-bold py-2 px-6 rounded shadow transition">Gerar</button>
                </div>
                <div id="resultadoPostHoc" class="p-4 bg-gray-50 rounded border border-gray-100 hidden"></div>
            </div>
        </section>
    </main>

    <script>
        // =======================================================
        // COLOQUE SUA URL DO RENDER AQUI:
        const API_URL = "https://api-estatistica-xyz.onrender.com/api/analise/fatorial"; 
        // =======================================================

        let arquivoCarregado = null; // Guarda o arquivo para usar no Post-Hoc

        // Controle Visual das Abas
        function alternarEntrada(tipo) {
            document.getElementById('entradaCsv').classList.toggle('hidden', tipo !== 'csv');
            document.getElementById('entradaManual').classList.toggle('hidden', tipo !== 'manual');
            
            document.getElementById('btnAbaCsv').className = tipo === 'csv' ? 'font-bold text-green-700 border-b-2 border-green-700 px-2 py-1' : 'font-semibold text-gray-500 px-2 py-1';
            document.getElementById('btnAbaManual').className = tipo === 'manual' ? 'font-bold text-green-700 border-b-2 border-green-700 px-2 py-1' : 'font-semibold text-gray-500 px-2 py-1';
        }

        // Exibe o dropdown de modelos se regressão for escolhida
        function verificarModelo() {
            const seletor = document.getElementById('seletorPostHoc').value;
            if(seletor.includes("regr")) document.getElementById('seletorModeloRegr').classList.remove('hidden');
            else document.getElementById('seletorModeloRegr').classList.add('hidden');
        }

        // === LÓGICA DA DIGITAÇÃO MANUAL INTERATIVA ===
        function gerarGradeManual() {
            let na = parseInt(document.getElementById('manA').value);
            let nb = parseInt(document.getElementById('manB').value);
            let nr = parseInt(document.getElementById('manR').value);
            
            let html = '<table class="w-full text-sm mt-4 border text-center"><thead><tr class="bg-gray-100"><th>Fator A</th><th>Fator B</th><th>Bloco</th><th>Valor Produção</th></tr></thead><tbody>';
            for(let a=1; a<=na; a++) {
                for(let b=1; b<=nb; b++) {
                    for(let r=1; r<=nr; r++) {
                        html += `<tr>
                            <td class="border p-1"><input type="text" value="A${a}" class="w-16 text-center font-bold outline-none text-blue-800" readonly></td>
                            <td class="border p-1"><input type="text" value="B${b}" class="w-16 text-center font-bold outline-none text-blue-800" readonly></td>
                            <td class="border p-1">R${r}</td>
                            <td class="border p-1 bg-yellow-50 hover:bg-yellow-100"><input type="number" step="any" placeholder="0.00" class="w-24 text-center bg-transparent outline-none val-input"></td>
                        </tr>`;
                    }
                }
            }
            html += '</tbody></table>';
            document.getElementById('gradeManualContainer').innerHTML = html;
            document.getElementById('divBtnAnalisarManual').classList.remove('hidden');
        }

        // Transforma a tabela digitada em um CSV invisível
        function extrairCsvDaGrade() {
            let linhas = document.querySelectorAll('#gradeManualContainer tbody tr');
            let csvContent = "FatorA;FatorB;Bloco;Valor\n";
            for (let tr of linhas) {
                let a = tr.cells[0].querySelector('input').value;
                let b = tr.cells[1].querySelector('input').value;
                let bloco = tr.cells[2].innerText;
                let valor = tr.cells[3].querySelector('input').value;
                if(valor === "") throw new Error("Preencha todos os valores da grade antes de calcular.");
                csvContent += `${a};${b};${bloco};${valor.replace('.', ',')}\n`;
            }
            const blob = new Blob([csvContent], { type: 'text/csv' });
            return new File([blob], "dados_manuais.csv", { type: "text/csv" });
        }

        // === CHAMADA DA API (Serve tanto pro CSV quanto pro Manual) ===
        async function enviarParaAnalise(isManual) {
            try {
                if(isManual) arquivoCarregado = extrairCsvDaGrade();
                else {
                    let fileInput = document.getElementById('arquivoCsv');
                    if (!fileInput.files[0]) throw new Error("Selecione um arquivo CSV.");
                    arquivoCarregado = fileInput.files[0];
                }

                mostrarMensagem("Processando...", "text-blue-500");
                const formData = new FormData();
                formData.append("file", arquivoCarregado);
                formData.append("tipo_teste", "anova");

                const resposta = await fetch(API_URL, { method: 'POST', body: formData });
                const dados = await resposta.json();

                if (dados.status !== "sucesso") throw new Error(dados.mensagem || dados.detail);

                document.getElementById('txtCv').innerText = dados.cv;
                let tbody = document.getElementById('corpoTabelaAnova'); tbody.innerHTML = '';
                dados.anova.forEach(linha => {
                    tbody.innerHTML += `<tr class="border-b"><td class="px-4 py-2">${linha.FV}</td><td class="px-4 py-2">${linha.GL}</td><td class="px-4 py-2">${linha.SQ}</td><td class="px-4 py-2">${linha.QM}</td><td class="px-4 py-2">${linha["F Calc"]}</td><td class="px-4 py-2 font-bold ${linha.Sig.includes('*') ? 'text-green-600' : 'text-gray-400'}">${linha.Sig}</td></tr>`;
                });

                document.getElementById('areaResultados').classList.remove('hidden');
                document.getElementById('areaPostHoc').classList.remove('hidden');
                document.getElementById('resultadoPostHoc').classList.add('hidden');
                mostrarMensagem("Quadro da ANOVA gerado com sucesso!", "text-green-600");

            } catch (erro) {
                mostrarMensagem(erro.message, "text-red-600");
            }
        }

        // === PÓS-TESTE (TUKEY / REGRESSÃO) ===
        async function gerarPostHoc() {
            const seletor = document.getElementById('seletorPostHoc').value;
            const modelo_escolhido = document.getElementById('seletorModeloRegr').value;
            const divResultado = document.getElementById('resultadoPostHoc');
            
            if (!arquivoCarregado) return;

            const formData = new FormData();
            formData.append("file", arquivoCarregado);
            formData.append("tipo_teste", seletor);
            if(seletor.includes("regr")) formData.append("modelo_regr", modelo_escolhido);

            divResultado.innerHTML = "<p class='text-blue-500'>Calculando modelo...</p>";
            divResultado.classList.remove('hidden');

            try {
                const resposta = await fetch(API_URL, { method: 'POST', body: formData });
                const dados = await resposta.json();

                if (dados.status !== "sucesso") throw new Error(dados.mensagem);

                if (dados.tipo === "regressao") {
                    divResultado.innerHTML = `
                        <div class="mb-4 text-sm bg-blue-50 p-3 rounded">
                            <p><strong>Equação (${dados.modelo}):</strong> ${dados.equacao}</p>
                            <p><strong>R²:</strong> ${dados.r2}</p>
                        </div>
                        <img src="data:image/png;base64,${dados.img_png}" class="max-w-full border rounded mb-4">
                        <a href="data:application/pdf;base64,${dados.img_pdf}" download="grafico.pdf" class="bg-gray-800 text-white py-2 px-4 rounded text-sm">📥 Baixar PDF</a>
                    `;
                } else if (dados.tipo === "tukey") {
                    let linhasHtml = dados.tabela.map(l => `<tr class="border-t"><td class="p-2">${l['Nível']}</td><td class="p-2">${l['Média']}</td><td class="p-2 font-bold text-green-700">${l['Letra']}</td></tr>`).join('');
                    divResultado.innerHTML = `
                        <div class="flex space-x-6 text-sm bg-green-50 p-3 rounded"><span><strong>q:</strong> ${dados.q}</span><span><strong>DMS:</strong> ${dados.dms}</span></div>
                        <table class="w-full mt-4 bg-white border text-left text-sm"><thead class="bg-gray-100"><tr><th class="p-2">Trat.</th><th class="p-2">Média</th><th class="p-2">Letra</th></tr></thead><tbody>${linhasHtml}</tbody></table>
                    `;
                }
            } catch (erro) {
                divResultado.innerHTML = `<p class="text-red-600 font-bold p-3 bg-red-50 border border-red-200 rounded">${erro.message}</p>`;
            }
        }

        function mostrarMensagem(texto, cor) {
            const msg = document.getElementById('mensagem');
            msg.className = `mt-3 text-sm font-medium p-2 rounded ${cor.includes('red') ? 'bg-red-50' : ''} ${cor}`;
            msg.innerText = texto; msg.classList.remove('hidden');
        }
    </script>
</body>
</html>
