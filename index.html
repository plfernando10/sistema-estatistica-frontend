<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solver Estatística Experimental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .menu-ativo { background-color: #dcfce7; color: #15803d; font-weight: bold; border-right: 4px solid #16a34a; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Suaviza o deslizamento da barra lateral */
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col md:flex-row h-screen w-full overflow-hidden relative">

    <header class="md:hidden bg-green-700 text-white p-4 flex justify-between items-center shadow-md z-30">
        <div class="flex flex-col">
            <h1 class="text-lg font-extrabold tracking-tight leading-tight">Solver Estatística</h1>
            <span class="text-[10px] text-green-200 font-medium">Por: Fernando Paes Lorena</span>
        </div>
        <button id="btnAbrirMenu" onclick="toggleMenu()" class="text-white hover:text-green-200 focus:outline-none p-2">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </header>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-40 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="sidebar-transition fixed md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-72 md:w-64 bg-white shadow-2xl md:shadow-md flex flex-col h-full z-50">
        <div class="p-6 bg-green-700 text-white shadow-inner hidden md:block">
            <h1 class="text-xl font-extrabold tracking-tight">Solver Estatística</h1>
            <p class="text-xs text-green-200 mt-1 font-medium">Por: Fernando Paes Lorena</p>
        </div>
        
        <div class="p-4 bg-green-700 flex justify-between items-center md:hidden shadow-inner">
            <h2 class="text-lg font-bold text-white">Menu</h2>
            <button onclick="toggleMenu()" class="text-white hover:text-green-200 p-2 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <button id="btnMenuInicio" onclick="mudarAba('aba-inicio', this)" class="menu-btn menu-ativo w-full text-left px-4 py-3 rounded-lg text-sm text-gray-600 hover:bg-green-50 transition-all shadow-sm">
                🏠 Início
            </button>
            <button id="btnMenuSimples" onclick="mudarAba('aba-simples', this)" class="menu-btn w-full text-left px-4 py-3 rounded-lg text-sm text-gray-600 hover:bg-green-50 transition-all shadow-sm">
                📊 DIC / DBC / DQL
            </button>
            <button id="btnMenuFatorial" onclick="mudarAba('aba-fatorial', this)" class="menu-btn w-full text-left px-4 py-3 rounded-lg text-sm text-gray-600 hover:bg-green-50 transition-all shadow-sm">
                📈 Fatorial (A x B)
            </button>
            <button id="btnMenuParcelas" onclick="mudarAba('aba-parcelas', this)" class="menu-btn w-full text-left px-4 py-3 rounded-lg text-sm text-gray-600 hover:bg-green-50 transition-all shadow-sm">
                📑 Parcelas Subdivididas
            </button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-gray-50 p-4 md:p-8 w-full">
        
        <section id="aba-inicio" class="aba-conteudo block fade-in max-w-6xl mx-auto">
            <div class="bg-gradient-to-br from-green-700 to-green-600 rounded-2xl p-6 md:p-10 text-white shadow-xl mb-8 relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-3 md:mb-4">Solver Estatística</h2>
                    <p class="text-base md:text-lg text-green-100 max-w-2xl mb-6 md:mb-8 leading-relaxed">
                        A plataforma analítica para ensaios de campo. Processe dados, avalie cultivares e obtenha laudos estatísticos com F-Tabelado exato.
                    </p>
                    <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
                        <button onclick="document.getElementById('btnMenuSimples').click()" class="bg-white text-green-700 font-bold py-3 px-6 rounded-lg shadow hover:shadow-lg hover:bg-gray-50 transition-all text-center">
                            Iniciar Análise Simples
                        </button>
                        <button onclick="document.getElementById('btnMenuFatorial').click()" class="bg-transparent border-2 border-green-200 text-white font-bold py-3 px-6 rounded-lg hover:bg-green-600 hover:border-white transition-all text-center">
                            Testar Fatorial (A x B)
                        </button>
                    </div>
                </div>
