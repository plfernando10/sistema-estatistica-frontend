<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solver Estatística Experimental - Fernando Paes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.menu-ativo { background-color: #dcfce7; color: #15803d; font-weight: bold; border-right: 4px solid #16a34a; }</style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md flex flex-col h-full z-10">
        <div class="p-6 bg-green-700 text-white">
            <h1 class="text-xl font-bold">Solver Estatística</h1>
            <p class="text-xs text-green-200 mt-1">Por: Fernando Paes Lorena</p>
        </div>
        <nav class="flex-1 px-2 py-4 space-y-2">
            <button onclick="mudarAba('aba-inicio', this)" class="menu-btn menu-ativo w-full text-left px-4 py-3 rounded text-sm text-gray-600 hover:bg-green-50">🏠 Início</button>
            <button onclick="mudarAba('aba-simples', this)" class="menu-btn w-full text-left px-4 py-3 rounded text-sm text-gray-600 hover:bg-green-50">📊 DIC / DBC / DQL</button>
            <button onclick="mudarAba('aba-fatorial', this)" class="menu-btn w-full text-left px-4 py-3 rounded text-sm text-gray-600 hover:bg-green-50">📈 Fatorial (A x B)</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <section id="aba-inicio" class="aba-conteudo block">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Bem-vindo ao Solver Estatística</h2>
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded text-blue-900 max-w-2xl text-sm">
                Software de processamento estatístico para ensaios de campo. O sistema utiliza a biblioteca SciPy que calcula o <strong>F Tabelado matemático exato</strong>.
            </div>
        </section>

        <section id="aba-simples" class="aba-conteudo hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Análise Simples</h2>
            <div class="mb-4 bg-white p-4 rounded border flex items-center space-x-4 shadow-sm text-sm">
                <label class="font-bold">Delineamento:</label>
                <label><input type="radio" name="delinSimples" value="dbc" checked> DBC</label>
                <label><input type="radio" name="delinSimples" value="dic"> DIC</label>
                <label><input type="radio" name="delinSimples" value="dql"> DQL</label>
            </div>
            <div class="bg-white p-6 rounded border max-w-2xl shadow-sm">
                <label class="block text-sm mb-2 text-gray-600">CSV de 3 ou 4 colunas (DQL)</label>
                <div class="flex space-x-4"><input type="file" id="csvSimples" accept=".csv" class="border p-2 rounded flex-1"><button onclick="calcularSimples()" class="bg-green-600 text-white px-6 py-2 rounded font-bold">Calcular ANOVA</button></div>
            </div>
            <div id="resSimples" class="hidden bg-white p-6 rounded border shadow-sm mt-6"></div>
        </section>

        <section id="aba-fatorial" class="aba-conteudo hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Fatorial Duplo (A x B) em DBC</h2>
            <div class="bg-white p-6 rounded border max-w-2xl shadow-sm">
                <label class="block text-sm mb-2 text-gray-600">CSV de 4 colunas: <strong>FatorA; FatorB; Bloco; Valor</strong></label>
                <div class="flex space-x-4"><input type="file" id="csvFatorial" accept=".csv" class="border p-2 rounded flex-1"><button onclick="calcularFatorial()" class="bg-green-600 text-white px-6 py-2 rounded font-bold">Calcular ANOVA</button></div>
            </div>
            <div id="resFatorial" class="hidden bg-white p-6 rounded border shadow-sm mt-6"></div>

            <div id="areaPostHoc" class="hidden bg-white p-6 rounded border mt-6 shadow-sm">
                <h3 class="text-xl font-bold mb-4 text-gray-800">Testes de Médias e Regressão</h3>
                <div class="flex space-x-4 mb-4">
                    <select id="selPostHoc" onchange="verificarCamposPostHoc()" class="border p-2 rounded bg-gray-50 focus:ring-green-500">
                        <optgroup label="Tukey">
                            <option value="tukey_a">Tukey (Fator A)</option>
                            <option value="tukey_b">Tukey (Fator B)</option>
                        </optgroup>
                        <optgroup label="Duncan">
                            <option value="duncan_a">Duncan (Fator A)</option>
                            <option value="duncan_b">Duncan (Fator B)</option>
                        </optgroup>
                        <optgroup label="Dunnett (Vs. Testemunha)">
                            <option value="dunnett_a">Dunnett (Fator A)</option>
                            <option value="dunnett_b">Dunnett (Fator B)</option>
                        </optgroup>
                        <optgroup label="Regressão Quantitativa">
                            <option value="regr_a">Regressão (Fator A)</option>
                            <option value="regr_b">Regressão (Fator B)</option>
                        </optgroup>
                    </select>

                    <select id="selModRegr" class="hidden border p-2 rounded bg-gray-50">
                        <option value="linear">Linear</option><option value="quadratica" selected>Quadrática</option><option value="logaritmica">Logarítmica</option><option value="exponencial">Exponencial</option>
                    </select>

                    <input type="text" id="txtTestemunha" placeholder="Nome da Testemunha Ex: C1" class="hidden border p-2 rounded bg-gray-50">

                    <button onclick="calcularPostHoc()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold shadow">Gerar Análise</button>
                </div>
                <div id="resPostHoc" class="p-4 bg-gray-50 rounded border hidden"></div>
            </div>
        </section>

        <p id="globalMsg" class="mt-4 p-3 rounded border text-sm font-semibold hidden max-w-2xl"></p>
    </main>

    <script>
        const API_URL = "https://api-estatistica-xyz.onrender.com/api/analise/"; 

        let arquivoFatorialGlobal = null;

        function mudarAba(id, btn) {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.replace('block', 'hidden'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('menu-ativo'));
            document.getElementById(id).classList.replace('hidden', 'block');
            btn.classList.add('menu-ativo'); document.getElementById('globalMsg').classList.add('hidden');
        }

        function verificarCamposPostHoc() {
            const val = document.getElementById('selPostHoc').value;
            document.getElementById('selModRegr').classList.toggle('hidden', !val.includes('regr'));
            document.getElementById('txtTestemunha').classList.toggle('hidden', !val.includes('dunnett'));
        }

        function mostrarMsg(txt, classe) {
            const m = document.getElementById('globalMsg');
            m.className = `mt-4 p-3 rounded border text-sm font-semibold max-w-2xl ${classe}`;
            m.innerText = txt; m.classList.remove('hidden');
        }

        function montarTabelaAnovaHtml(anova, cvHtml) {
            let linhas = anova.map(l => `<tr class="border-b"><td class="p-2 font-medium">${l.FV}</td><td class="p-2 text-center">${l.GL}</td><td class="p-2">${l.SQ}</td><td class="p-2">${l.QM}</td><td class="p-2">${l['F Calc']}</td><td class="p-2 font-bold text-indigo-700">${l['F Tab']}</td><td class="p-2 font-bold ${l.Sig.includes('*') ? 'text-green-600' : 'text-gray-400'}">${l.Sig}</td></tr>`).join('');
            return `<div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-gray-700">Quadro da ANOVA</h3>${cvHtml}</div>
                    <table class="w-full text-left text-sm whitespace-nowrap border"><thead><tr class="bg-gray-100 text-gray-700">
                    <th class="p-2">Causa de Variação</th><th class="p-2 text-center">GL</th><th class="p-2">SQ</th><th class="p-2">QM</th><th class="p-2">F Calc</th><th class="p-2 text-indigo-700">F Tab (5%)</th><th class="p-2">Significância</th></tr></thead><tbody>${linhas}</tbody></table>`;
        }

        async function calcularSimples() {
            try {
                let file = document.getElementById('csvSimples').files[0];
                if(!file) throw new Error("Selecione um arquivo CSV.");
                mostrarMsg("Processando...", "bg-blue-50 text-blue-700");
                let fd = new FormData(); fd.append("file", file); fd.append("tipo_delineamento", document.querySelector('input[name="delinSimples"]:checked').value);
                let res = await fetch(API_URL + "simples", {method:'POST', body:fd}), d = await res.json();
                if(d.status !== "sucesso") throw new Error(d.detail);
                document.getElementById('resSimples').innerHTML = montarTabelaAnovaHtml(d.anova, `<div class="bg-gray-100 px-3 py-1 border rounded"><strong>CV (%):</strong> ${d.cv}</div>`);
                document.getElementById('resSimples').classList.remove('hidden'); mostrarMsg("Sucesso!", "bg-green-50 text-green-700");
            } catch(e) { mostrarMsg(e.message, "bg-red-50 text-red-700"); }
        }

        async function calcularFatorial() {
            try {
                arquivoFatorialGlobal = document.getElementById('csvFatorial').files[0];
                if(!arquivoFatorialGlobal) throw new Error("Selecione o CSV.");
                mostrarMsg("Calculando ANOVA...", "bg-blue-50 text-blue-700");
                let fd = new FormData(); fd.append("file", arquivoFatorialGlobal); fd.append("tipo_teste", "anova");
                let res = await fetch(API_URL + "fatorial", {method:'POST', body:fd}), d = await res.json();
                if(d.status !== "sucesso") throw new Error(d.detail);
                document.getElementById('resFatorial').innerHTML = montarTabelaAnovaHtml(d.anova, `<div class="bg-gray-100 px-3 py-1 border rounded"><strong>CV (%):</strong> ${d.cv}</div>`);
                document.getElementById('resFatorial').classList.remove('hidden'); document.getElementById('areaPostHoc').classList.remove('hidden');
                mostrarMsg("ANOVA Finalizada!", "bg-green-50 text-green-700");
            } catch(e) { mostrarMsg(e.message, "bg-red-50 text-red-700"); }
        }

        async function calcularPostHoc() {
            try {
                let th = document.getElementById('selPostHoc').value;
                let fd = new FormData(); fd.append("file", arquivoFatorialGlobal); fd.append("tipo_teste", th);
                if(th.includes("regr")) fd.append("modelo_regr", document.getElementById('selModRegr').value);
                if(th.includes("dunnett")) fd.append("testemunha", document.getElementById('txtTestemunha').value);
                
                document.getElementById('resPostHoc').innerHTML = "<p class='text-blue-600'>Gerando análise...</p>";
                document.getElementById('resPostHoc').classList.remove('hidden');
                
                let res = await fetch(API_URL + "fatorial", {method:'POST', body:fd}), d = await res.json();
                if(d.status !== "sucesso") throw new Error(d.mensagem || "Erro na análise.");
                
                if(d.tipo === "regressao") {
                    document.getElementById('resPostHoc').innerHTML = `<div class="bg-blue-50 p-3 rounded mb-3"><strong>Equação (${d.modelo}):</strong> ${d.equacao} <br><strong>R²:</strong> ${d.r2}</div><img src="data:image/png;base64,${d.img_png}" class="border mb-3"><br><a href="data:application/pdf;base64,${d.img_pdf}" download="graf.pdf" class="bg-gray-800 text-white px-4 py-2 rounded">📥 Baixar PDF</a>`;
                } else if(d.tipo === "tukey" || d.tipo === "duncan") {
                    let desc = d.tipo === "tukey" ? `<strong>q (Tukey):</strong> ${d.q} | <strong>DMS:</strong> ${d.dms}` : `<strong>Alcances de Duncan (p):</strong> <br> ${Object.entries(d.alcances).map(([p, v]) => `p=${p} ➔ ${v}`).join(' | ')}`;
                    let rows = d.tabela.map(l => `<tr class="border-t"><td class="p-2">${l['Nível']}</td><td class="p-2">${l['Média']}</td></tr>`).join('');
                    document.getElementById('resPostHoc').innerHTML = `<div class="bg-green-50 p-3 rounded mb-3 text-sm">${desc}</div><table class="w-64 text-sm text-left border"><thead><tr class="bg-gray-100"><th class="p-2">Tratamento</th><th class="p-2">Média</th></tr></thead><tbody>${rows}</tbody></table>`;
                } else if(d.tipo === "dunnett") {
                    let rows = d.resultados.map(l => `<tr class="border-t"><td class="p-2">${l.Tratamento}</td><td class="p-2">${l.Média}</td><td class="p-2 font-mono">${l.Diferença}</td><td class="p-2 font-bold ${l.Sig.includes('*') ? 'text-green-600' : 'text-gray-400'}">${l.Sig}</td></tr>`).join('');
                    document.getElementById('resPostHoc').innerHTML = `<div class="bg-purple-50 p-3 rounded mb-3 text-sm"><strong>Testemunha:</strong> ${d.testemunha} (Média: ${d.media_testemunha}) <br><strong>DMS (Dunnett):</strong> ${d.dms}</div><table class="w-full text-sm text-left border"><thead><tr class="bg-gray-100"><th class="p-2">Tratamento</th><th class="p-2">Média</th><th class="p-2">Dif. para Testemunha</th><th class="p-2">Significância</th></tr></thead><tbody>${rows}</tbody></table>`;
                }
            } catch(e) { document.getElementById('resPostHoc').innerHTML = `<p class="text-red-600 font-bold">${e.message}</p>`; }
        }
    </script>
</body>
</html>
